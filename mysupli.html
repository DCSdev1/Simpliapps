    <style>
        /* ====== MYSUPLI COLOR ====== */
        :root {
            --supli: #417E86;
            --supli-light: #E3F0F1;
            --supli-dark: #2D5A60;
        }

        /* ====== HERO ====== */
        .supli-hero {
            max-width: 1140px;
            margin: 0 auto;
            padding: 9rem 2rem 5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .supli-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--supli-light);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--supli);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        .supli-hero h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--dark);
            margin-bottom: 1.2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .supli-hero h1 em {
            font-style: italic;
            color: var(--supli);
        }

        .supli-hero-text > p {
            font-size: 1.05rem;
            color: var(--gray);
            line-height: 1.7;
            font-weight: 300;
            max-width: 440px;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.4s forwards;
        }

        .supli-hero-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        .btn-supli {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            background: var(--supli);
            color: var(--white);
            text-decoration: none;
            border-radius: 100px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-supli:hover {
            background: var(--supli-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(65,126,134,0.25);
        }

        /* Screenshot carousel */
        .supli-hero-visual {
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.6s forwards;
        }

        .screens-stack {
            position: relative;
            height: 520px;
            width: 100%;
        }

        .screen-card {
            position: absolute;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 24px 56px rgba(26,26,46,0.15), 0 0 0 1px rgba(26,26,46,0.04);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .screen-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .screen-card.pos-0 { width: 210px; height: 450px; left: 50%; transform: translateX(-50%); z-index: 4; }
        .screen-card.pos-1 { width: 190px; height: 410px; left: 22%; transform: translateX(-50%) translateY(15px) rotate(-6deg); z-index: 3; }
        .screen-card.pos-2 { width: 190px; height: 410px; left: 78%; transform: translateX(-50%) translateY(15px) rotate(6deg); z-index: 3; }
        .screen-card.pos-3 { width: 170px; height: 370px; left: 10%; transform: translateX(-50%) translateY(40px) rotate(-10deg); z-index: 2; opacity: 0.6; }

        .screen-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .screen-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #E0E0E0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .screen-dot.active {
            background: var(--supli);
            width: 24px;
            border-radius: 4px;
        }

        /* ====== FEATURES ====== */
        .supli-features { background: var(--light); }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 3rem;
        }

        .feature-card {
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 16px;
            padding: 1.8rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(26,26,46,0.06);
        }

        .feature-icon {
            font-size: 1.6rem;
            display: block;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            font-family: var(--font-display);
            font-size: 1.05rem;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }

        .feature-card p {
            font-size: 0.88rem;
            color: var(--gray);
            line-height: 1.6;
            font-weight: 300;
        }

        /* ====== SCREENSHOTS SECTION ====== */
        .supli-screenshots { background: var(--white); }

        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin-top: 3rem;
        }

        .screenshot-item {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(26,26,46,0.1), 0 0 0 1px rgba(26,26,46,0.04);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .screenshot-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 56px rgba(26,26,46,0.14);
        }

        .screenshot-item img { width: 100%; display: block; }

        .screenshot-label {
            padding: 0.75rem 1rem;
            background: var(--white);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--gray);
            text-align: center;
        }

        /* ====== HOW IT WORKS ====== */
        .supli-how {
            max-width: 680px;
            margin: 0 auto;
            padding: 6rem 2rem;
            text-align: center;
        }

        .steps {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .step {
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 16px;
            padding: 1.5rem 1.8rem;
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
            text-align: left;
            transition: transform 0.2s;
        }

        .step:hover { transform: translateX(4px); }

        .step-num {
            width: 40px; height: 40px;
            flex-shrink: 0;
            background: var(--supli-light);
            color: var(--supli);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.1rem;
        }

        .step h3 {
            font-family: var(--font-display);
            font-size: 1.05rem;
            color: var(--dark);
            margin-bottom: 0.3rem;
        }

        .step p {
            font-size: 0.9rem;
            color: var(--gray);
            line-height: 1.6;
            font-weight: 300;
        }

        /* ====== CTA ====== */
        .supli-cta-section { padding: 0 2rem 6rem; max-width: 760px; margin: 0 auto; }

        .supli-cta-box {
            background: var(--dark);
            border-radius: 24px;
            padding: 4rem 3rem;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .supli-cta-box::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 200px; height: 200px;
            background: var(--supli);
            border-radius: 50%;
            opacity: 0.12;
        }

        .supli-cta-box::after {
            content: '';
            position: absolute;
            bottom: -80px; left: -40px;
            width: 240px; height: 240px;
            background: var(--supli);
            border-radius: 50%;
            opacity: 0.06;
        }

        .supli-cta-box h2 {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            color: var(--white);
            letter-spacing: -0.01em;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .supli-cta-box h2 em {
            font-style: italic;
            color: #7DC8CE;
        }

        .supli-cta-box > p {
            color: rgba(255,255,255,0.55);
            font-size: 1rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
            font-weight: 300;
        }

        .coming-soon-badge {
            display: inline-block;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.75);
            padding: 0.8rem 2rem;
            border-radius: 100px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .supli-cta-note {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
            position: relative;
            z-index: 1;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 900px) {
            .supli-hero {
                grid-template-columns: 1fr;
                padding-top: 7rem;
                text-align: center;
            }
            .supli-hero-text > p { margin: 0 auto 2rem; }
            .supli-hero-actions { justify-content: center; }
            .screens-stack { height: 380px; }
            .screen-card.pos-0 { width: 175px; height: 375px; }
            .screen-card.pos-1 { width: 155px; height: 335px; left: 15%; }
            .screen-card.pos-2 { width: 155px; height: 335px; left: 85%; }
            .screen-card.pos-3 { display: none; }
            .features-grid { grid-template-columns: 1fr 1fr; }
            .screenshots-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .features-grid { grid-template-columns: 1fr; }
            .screenshots-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
            .supli-cta-box { padding: 3rem 1.5rem; }
            .supli-hero-actions { flex-direction: column; align-items: center; }
        }
    </style>
</head>

    <script>
        /* ====== SCREENSHOT CAROUSEL ====== */
        var positions = ['pos-0', 'pos-1', 'pos-2', 'pos-3'];
        var currentOffset = 0;

        function rotateScreens() {
            currentOffset = (currentOffset + 1) % 4;
            updateScreenPositions();
        }

        function goToScreen(index) {
            currentOffset = index;
            updateScreenPositions();
        }

        function updateScreenPositions() {
            var cards = document.querySelectorAll('.screen-card');
            for (var i = 0; i < cards.length; i++) {
                cards[i].className = 'screen-card ' + positions[(i - currentOffset + 4) % 4];
            }
            var dots = document.querySelectorAll('.screen-dot');
            for (var i = 0; i < dots.length; i++) {
                if (i === currentOffset) {
                    dots[i].classList.add('active');
                } else {
                    dots[i].classList.remove('active');
                }
            }
        }

        setInterval(rotateScreens, 3500);
    </script>
